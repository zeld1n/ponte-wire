spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5433/pontewire_db
    username: admin
    password: password
  application:
    name: pw-gateway
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    admin:
      auto-create: true

server:
  port: 8080